<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&amp;family=Open+Sans:wght@300&amp;display=swap');
    </style>

    <!-- Deep background gradient for emblem -->
    <linearGradient id="emblemBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e2c56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13111e;stop-opacity:1" />
    </linearGradient>

    <!-- Green glow filter -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ─── EMBLEM ────────────────────────────────────────────── -->

  <!-- Outer circle ring -->
  <circle cx="60" cy="60" r="52" fill="url(#emblemBg)" filter="url(#shadow)" />
  <circle cx="60" cy="60" r="52" fill="none" stroke="#3d3d69" stroke-width="1.5" />

  <!-- Inner thin accent ring -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="#58d98c" stroke-width="0.75" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Globe / world arc lines suggesting global reach -->
  <!-- Horizontal equator -->
  <ellipse cx="60" cy="60" rx="28" ry="28" fill="none" stroke="#3d3d69" stroke-width="1"/>
  <!-- Vertical meridian -->
  <line x1="60" y1="32" x2="60" y2="88" stroke="#3d3d69" stroke-width="1"/>
  <!-- Latitude curves -->
  <path d="M 32 60 Q 46 52 60 52 Q 74 52 88 60" fill="none" stroke="#3d3d69" stroke-width="0.8"/>
  <path d="M 32 60 Q 46 68 60 68 Q 74 68 88 60" fill="none" stroke="#3d3d69" stroke-width="0.8"/>

  <!-- Heart shape at center — the "Hope" element -->
  <path d="M60 70
           C60 70 44 61 44 52
           C44 46 49 42 54.5 44
           C57 45 59 47 60 49
           C61 47 63 45 65.5 44
           C71 42 76 46 76 52
           C76 61 60 70 60 70Z"
        fill="#58d98c"
        filter="url(#greenGlow)"
        opacity="0.95"/>

  <!-- Small upward arrow inside heart = "Edge / forward" -->
  <path d="M60 66 L60 54 M57 57 L60 54 L63 57"
        stroke="#13111e"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- ─── WORDMARK ──────────────────────────────────────────── -->

  <!-- HOPEEDGE — primary wordmark -->
  <text
    x="130"
    y="58"
    font-family="Oswald, Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="4"
    fill="#ffffff"
  >HOPE<tspan fill="#58d98c">EDGE</tspan></text>

  <!-- Thin divider line -->
  <line x1="130" y1="67" x2="390" y2="67" stroke="#3d3d69" stroke-width="0.75"/>

  <!-- FOUNDATION — subtitle -->
  <text
    x="131"
    y="84"
    font-family="Oswald, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="8"
    fill="#a89fd4"
  >FOUNDATION</text>

  <!-- Tagline -->
  <text
    x="131"
    y="100"
    font-family="Arial, sans-serif"
    font-size="9"
    font-weight="300"
    letter-spacing="2"
    fill="#58d98c"
    opacity="0.8"
  >EMPOWERING COMMUNITIES WORLDWIDE</text>

</svg>
